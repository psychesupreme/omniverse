# 1. HTTP Server Block - Redirect all port 80 traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name omniroute.io *.omniroute.io;

    # Allow ACME challenge for Let's Encrypt SSL certificates
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server Block - SSL & Production Application Routing
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name omniroute.io *.omniroute.io;

    root /var/www/html/public;
    index index.php index.html;
    charset utf-8;

    # Client upload limits for mobile photo evidence uploads
    client_max_body_size 50M;

    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/omniroute.crt;
    ssl_certificate_key /etc/nginx/ssl/omniroute.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Quiet logging for standard system checks
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP-FPM Application Requests
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # WebSocket Proxying to Laravel Reverb (Port 8085)
    location /app {
        proxy_pass http://reverb:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static Asset Caching for Vite Compiled Builds & Storage Uploads
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    # Prevent direct access to hidden files
    location ~ /\.ht {
        deny all;
    }
}
