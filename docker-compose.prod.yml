version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: omniroute-app:prod
    container_name: omniroute-app
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-omniroute}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8085
    volumes:
      - ./:/var/www/html
      - storage-data:/var/www/html/storage
    networks:
      - omniroute-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: omniroute-web
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/conf.d/omniroute.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - omniroute-network
    depends_on:
      - app

  db:
    image: postgis/postgis:15-3.3
    container_name: omniroute-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-omniroute}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - omniroute-db-data:/var/lib/postgresql/data
    networks:
      - omniroute-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-omniroute}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: omniroute-redis
    restart: always
    volumes:
      - omniroute-redis-data:/data
    networks:
      - omniroute-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    image: omniroute-app:prod
    container_name: omniroute-reverb
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8085
    ports:
      - "8085:8085"
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - ./:/var/www/html
    networks:
      - omniroute-network
    depends_on:
      - app
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: omniroute-app:prod
    container_name: omniroute-queue
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - ./:/var/www/html
    networks:
      - omniroute-network
    depends_on:
      - app
      - redis

networks:
  omniroute-network:
    driver: bridge

volumes:
  omniroute-db-data:
    driver: local
  omniroute-redis-data:
    driver: local
  storage-data:
    driver: local
